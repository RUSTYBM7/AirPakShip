<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Performance optimizations -->
  <meta name="theme-color" content="#0f172a" />

  <!-- Preconnect to external domains for faster resource loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Preload critical fonts -->
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" as="style" />
  <link rel="preload" href="https://fonts.gstatic.com/s/inter/v18/QGYv_z_d-F5-4N-LnFX-dVei46D5.woff2" as="font" type="font/woff2" crossorigin />

  <!-- Load fonts with display=swap for better performance -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </noscript>

  <!-- Favicon with proper sizing -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" sizes="32x32" href="/favicon-32x32.svg" />
  <link rel="icon" sizes="16x16" href="/favicon-16x16.svg" />

  <!-- Critical CSS for above-the-fold content -->
  <style>
    /* Prevent FOUC (Flash of Unstyled Content) */
    html { background-color: #0f172a; }
    body { margin: 0; padding: 0; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    #root { min-height: 100vh; }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
